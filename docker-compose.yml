version: '3.8'

services:
  budstech-app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CLIENT_URL=http://localhost:3001
    env_file:
      - server/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      # Optional: Mount logs directory
      - ./logs:/app/logs
    networks:
      - budstech-network

networks:
  budstech-network:
    driver: bridge